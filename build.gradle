plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.bp20'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aspectj'

    // MySQL
    runtimeOnly 'com.mysql:mysql-connector-j'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Development
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    developmentOnly 'org.springframework.boot:spring-boot-docker-compose'

    // Springdoc OpenAPI (Swagger UI)
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.2'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testRuntimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.register('provisionSuperAdmin', JavaExec) {
    group = 'application'
    description = 'Provision the one-time SUPER_ADMIN account using an interactive password prompt.'
    dependsOn classes
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.bp20.backend.api.admin.bootstrap.SuperAdminProvisioningCli'
    standardInput = System.in

    doFirst {
        if (!project.hasProperty('adminEmail') || !project.hasProperty('adminName')) {
            throw new GradleException('Use -PadminEmail=<email> -PadminName=<name> [-PadminPhone=<phone>].')
        }
        args "--email=${project.property('adminEmail')}", "--name=${project.property('adminName')}"
        if (project.hasProperty('adminPhone')) {
            args "--phone-number=${project.property('adminPhone')}"
        }
    }
}
