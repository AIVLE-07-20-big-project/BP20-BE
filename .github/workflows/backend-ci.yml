name: Backend CI

# mainмңјлЎңмқҳ PR, к·ёлҰ¬кі  mainм—җ м§Ғм ‘ pushлҗ  л•Ңл§ҲлӢӨ мӢӨн–ү
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: мҶҢмҠӨ мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4

      - name: JDK 21 м„Өм№ҳ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle мәҗмӢң
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew мӢӨн–ү к¶Ңн•ң л¶Җм—¬
        run: chmod +x gradlew

      # н…ҢмҠӨнҠёлҠ” лЎңм»¬ MySQL л“ұ мқҳмЎҙм„ұмқҙ н•„мҡ”н•ҙм„ң м ңмҷён•ҳкі , м»ҙнҢҢмқјл§Ң кІҖмҰқн•ңлӢӨ.
      # (н…ҢмҠӨнҠё DBк№Ңм§Җ CIм—җ л¶ҷмқҙлҠ” кұҙ нҢҖ лӮҙм—җм„ң лі„лҸ„лЎң м •н•  н•„мҡ”к°Җ мһҲмқҢ)
      - name: л№Ңл“ң (н…ҢмҠӨнҠё м ңмҷё)
        run: ./gradlew build -x test --no-daemon
