spring:
  jpa:
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      schema-locations: classpath:mock/schema.sql
      data-locations: classpath:mock/data.sql
      continue-on-error: false

effect-verification:
  mock-public-access: true
  scheduler:
    enabled: ${EFFECT_VERIFICATION_SCHEDULER_ENABLED:false}
    fixed-delay-ms: ${EFFECT_VERIFICATION_SCHEDULER_DELAY_MS:60000}
    max-attempts: ${EFFECT_VERIFICATION_MAX_ATTEMPTS:3}
