spring:
  application:
    name: backend

  # 프로파일 세팅
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}   # 기본 활성 프로파일 (application-local.yml 사용)

  # JPA 세팅
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true          # 로그에 DB 쿼리 출력 시 포맷팅
    open-in-view: false

# 애플리케이션 포트 세팅
server:
  port: 8080
  forward-headers-strategy: framework


# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: info                            # 기본 로그는 INFO 레벨
    com.bp20: debug                       # 애플리케이션 로그는 DEBUG 레벨
    org.hibernate.SQL: debug              # JPA 쿼리 로깅
    org.hibernate.orm.jdbc.bind: trace    # SQL 바인딩 파라미터의 실제 값 로깅


# Spring Actuator 세팅
management:
  endpoints:
    web:
      exposure:
        include: health     # health만 외부 노출 (헬스체킹용)
  endpoint:
    health:
      show-details: always

# Spring Docs (Swagger UI) 세팅
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true
  show-actuator: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS}
    admin-expiration-seconds: ${JWT_ADMIN_EXPIRATION_SECONDS}
  iam:
    invitation-expiration-hours: ${INVITATION_EXPIRATION_HOURS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
