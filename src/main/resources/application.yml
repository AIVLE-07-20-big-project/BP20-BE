spring:
  application:
    name: backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: info
    com.bp20: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true
  show-actuator: true

# AI 서비스 연동 설정
ai:
  effect-verification:
    base-url: ${EFFECT_VERIFICATION_AI_URL:http://localhost:8000}
  review-sentiment:
    base-url: ${REVIEW_SENTIMENT_AI_URL:http://localhost:8001}

# 영수증 OCR 및 원가 분석 서비스 연동 설정
ocr-service:
  base-url: ${OCR_SERVICE_BASE_URL:http://localhost:8000}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS}
    admin-expiration-seconds: ${JWT_ADMIN_EXPIRATION_SECONDS}
  iam:
    invitation-expiration-hours: ${INVITATION_EXPIRATION_HOURS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000}

