server:
  port: 8080

spring:
  application:
    name: bp20-backend

  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bp20}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: aivle
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  profiles:
    active: local

  main:
    web-application-type: servlet
    banner-mode: console

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

weather:
  api:
    service-key: ${KMA_SERVICE_KEY}
    asos-hourly-url: https://apis.data.go.kr/1360000/AsosHourlyInfoService/getWthrDataList

ai:
  server-url: ${AI_SERVER_URL:http://localhost:8000}

llm:
  server-url: ${LLM_SERVER_URL:http://localhost:8001}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  level:
    root: INFO
    com.bp20.backend: DEBUG
    org.springframework.boot: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true

  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true

  show-actuator: true
