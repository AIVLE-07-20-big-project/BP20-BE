spring:
  config:
    import: optional:file:.env[.properties]

  # Docker Compose는 명령어로 직접 실행합니다.
  docker:
    compose:
      enabled: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Docker Compose의 MySQL은 호스트 3307 포트를 사용합니다.
    url: jdbc:mysql://localhost:${MYSQL_PORT:3307}/${MYSQL_DATABASE:bp20}?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:bp20user}
    password: ${MYSQL_PASSWORD:bp20password}

kma:
  forecast-url: https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst
