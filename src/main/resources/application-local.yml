spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Docker Compose exposes MySQL on host port 3307.
    # Every value can be overridden with an environment variable.
    url: jdbc:mysql://localhost:${MYSQL_PORT:3307}/${MYSQL_DATABASE:bp20}?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:bp20user}
    password: ${MYSQL_PASSWORD:bp20password}

  # Run Docker Compose explicitly with `docker compose up -d mysql`.
  docker:
    compose:
      enabled: false
