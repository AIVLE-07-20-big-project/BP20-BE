spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:bp20-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  jwt:
    secret: bp20-test-secret-key-with-at-least-32-characters
    expiration-seconds: 7200
    admin-expiration-seconds: 900
  iam:
    invitation-expiration-hours: 24
  cors:
    allowed-origins: http://localhost:3000

ai:
  effect-verification:
    base-url: http://localhost:8000
  review-sentiment:
    base-url: http://localhost:8001

ocr-service:
  base-url: http://localhost:8002
